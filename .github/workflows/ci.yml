name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  stylua:
    name: Lua formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          version: latest
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --check lua/

  boot:
    name: Headless boot (lockfile install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Neovim (latest stable)
        run: |
          curl -fsSLo nvim.tar.gz https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz
          sudo tar -C /opt -xzf nvim.tar.gz
          echo "/opt/nvim-linux-x86_64/bin" >> "$GITHUB_PATH"
      - name: Use repo as config
        run: |
          mkdir -p ~/.config
          ln -s "$GITHUB_WORKSPACE" ~/.config/nvim
      - name: Install plugins from lockfile
        run: nvim --headless "+Lazy! restore" +qa
      - name: Boot check
        run: |
          out=$(nvim --headless "+lua vim.print('boot-ok')" +qa 2>&1)
          echo "$out"
          echo "$out" | grep -q "boot-ok"
      - name: Verify script
        run: bash scripts/verify.sh || true

  boot-windows:
    name: Headless boot on Windows (experimental)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Neovim
        shell: pwsh
        run: |
          curl.exe -fsSLo nvim.zip https://github.com/neovim/neovim/releases/latest/download/nvim-win64.zip
          Expand-Archive nvim.zip -DestinationPath C:\
          "C:\nvim-win64\bin" | Out-File -Append $env:GITHUB_PATH
      - name: Use repo as config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "$env:LOCALAPPDATA" | Out-Null
          New-Item -ItemType SymbolicLink -Path "$env:LOCALAPPDATA\nvim" -Target "$env:GITHUB_WORKSPACE"
      - name: Install plugins from lockfile
        run: nvim --headless "+Lazy! restore" +qa
      - name: Boot check
        shell: pwsh
        run: |
          $out = nvim --headless "+lua vim.print('boot-ok')" +qa 2>&1 | Out-String
          Write-Host $out
          if ($out -notmatch "boot-ok") { exit 1 }
